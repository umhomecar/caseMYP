<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Sarabun',sans-serif;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --blue:#58a6ff;--blue2:#1f6feb;--green:#3fb950;--red:#f85149;
  --yellow:#d29922;--purple:#bc8cff;--orange:#ffa657;--cyan:#39d353;
  --radius:8px;--shadow:0 8px 24px rgba(0,0,0,.4);
}
body.light{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#f6f8fa;--bg4:#d0d7de;
  --border:#d0d7de;--text:#1f2328;--text2:#656d76;--text3:#848d97;
  --blue:#0969da;--blue2:#0550ae;--green:#1a7f37;--red:#cf222e;
  --yellow:#9a6700;--purple:#8250df;--orange:#bc4c00;
  --shadow:0 8px 24px rgba(0,0,0,.12);
}
body{background:var(--bg);color:var(--text);min-height:100vh;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.btn{cursor:pointer;border:none;border-radius:6px;padding:8px 16px;font-size:14px;font-weight:600;transition:all .15s;}
.btn-primary{background:var(--blue2);color:#fff;}
.btn-primary:hover{background:#388bfd;}
.btn-danger{background:#da3633;color:#fff;}
.btn-danger:hover{background:#f85149;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border);}
.btn-ghost:hover{background:var(--bg3);color:var(--text);}
.btn-green{background:#238636;color:#fff;}
.btn-green:hover{background:#2ea043;}
input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 12px;font-size:14px;outline:none;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
select option{background:var(--bg3);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow);}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-bd{padding:20px;}
.modal-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th{background:var(--bg3);padding:10px 12px;text-align:left;color:var(--text2);font-weight:600;white-space:nowrap;}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top;}
tr:hover td{background:rgba(255,255,255,.02);}
tr.clickable{cursor:pointer;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:12px;}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border);}
.sidebar-nav{flex:1;padding:8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;cursor:pointer;margin-bottom:2px;color:var(--text2);font-size:14px;transition:all .15s;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:#1f6feb22;color:var(--blue);border-left:3px solid var(--blue);}
.main-content{margin-left:220px;min-height:100vh;}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);z-index:50;}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;cursor:pointer;color:var(--text2);font-size:11px;gap:2px;}
.bottom-nav-item.active{color:var(--blue);}
@media(max-width:768px){
  .sidebar{display:none;}
  .main-content{margin-left:0;padding-bottom:70px;}
  .bottom-nav{display:flex;}
}
.page{padding:20px;}
.page-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-title{font-size:20px;font-weight:700;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;}
.stat-num{font-size:28px;font-weight:800;}
.stat-lbl{font-size:12px;color:var(--text2);margin-top:4px;}
.s-wait{background:#3a3d42;color:#ffffff;border:1px solid #6e7681;}
.s-go{background:#1a4731;color:#3fb950;}
.s-nurse{background:#3d2b00;color:#ffa657;}
.s-half{background:#2d1b00;color:#d29922;}
.s-cant{background:#3d1515;color:#f85149;}
.s-later{background:#2b1f3d;color:#bc8cff;}
.s-book{background:#0d2149;color:#58a6ff;}
.s-sign{background:#0d3149;color:#39d353;}
.s-wait2{background:#1a2a3d;color:#79c0ff;}
.s-approve{background:#132d18;color:#3fb950;}
.s-close{background:#5a0a0a;color:#ff6b6b;}
.s-reject{background:#3d0a0a;color:#f85149;}
.s-release{background:#0a2418;color:#3fb950;}
.s-other{background:#2d1500;color:#ffa657;}
.s-throw{background:#3d2e00;color:#ffd700;}
.market-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.market-card:hover{border-color:var(--blue2);}
.mk-page{display:flex;flex-direction:column;min-height:100vh;}
.mk-hero{background:linear-gradient(135deg,#0d1b2a 0%,#1a2744 60%,#0f2233 100%);padding:24px 24px 0;border-bottom:1px solid var(--border);}
.mk-hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
.mk-stats{display:flex;gap:4px;}
.mk-stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 20px;text-align:center;min-width:90px;}
.mk-stat-num{font-size:26px;font-weight:800;line-height:1;}
.mk-stat-lbl{font-size:11px;color:var(--text2);margin-top:3px;}
.mk-body{display:flex;flex:1;gap:0;}
.mk-cards-area{flex:1;padding:20px;min-width:0;}
.mk-sidebar{width:280px;flex-shrink:0;border-left:1px solid var(--border);padding:16px;background:var(--bg2);}
.mk-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.mkc{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .2s;cursor:default;}
.mkc:hover{border-color:var(--blue2);box-shadow:0 4px 20px rgba(31,111,235,.15);}
.mkc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.mkc-id{font-size:15px;font-weight:800;color:var(--blue);}
.mkc-date{font-size:11px;background:#2d2000;color:var(--yellow);padding:3px 8px;border-radius:20px;border:1px solid #4a3500;}
.mkc-name{font-size:15px;font-weight:700;margin-bottom:8px;}
.mkc-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.mkc-contact{font-size:12px;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.mkc-report{font-size:12px;color:var(--text2);background:var(--bg3);padding:8px 10px;border-radius:6px;margin-bottom:12px;line-height:1.6;max-height:72px;overflow:hidden;}
.mkc-actions{display:flex;gap:8px;}
.btn-claim{flex:1;background:var(--blue2);color:#fff;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;}
.btn-claim:hover{background:#388bfd;transform:translateY(-1px);}
.btn-claim:disabled{background:#1a3a5c;color:#4a7ab5;cursor:not-allowed;transform:none;}
.btn-skip{background:var(--bg3);color:var(--text2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;transition:all .15s;}
.btn-skip:hover{background:var(--bg4);}
.mk-sb-section{margin-bottom:20px;}
.mk-sb-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.5px;}
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.lb-rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.sb-stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg3);border-radius:8px;margin-bottom:6px;}
@media(max-width:900px){.mk-sidebar{display:none;}}
@media(max-width:600px){.mk-cards-grid{grid-template-columns:1fr;}.mk-hero{padding:16px 16px 0;}.mk-cards-area{padding:12px;}.mk-stats{flex-wrap:wrap;gap:6px;}.mk-stat{min-width:70px;padding:10px 12px;}}
.focus-block{border-radius:10px;padding:14px 16px;margin-bottom:12px;}
.ach-badge{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 12px;border-radius:10px;min-width:60px;transition:all .2s;}
.onboard-progress-dot{height:6px;border-radius:3px;transition:all .3s;}
.gs-result{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;}
.gs-result:hover{background:var(--bg3);}
.contact-action-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s;}
.ai-card{border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--border);background:var(--bg2);}
.ai-rank{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;flex-shrink:0;}
.ai-stream{white-space:pre-wrap;line-height:1.8;font-size:14px;color:var(--text);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ai-cursor{display:inline-block;width:2px;height:14px;background:var(--blue);margin-left:2px;animation:pulse .8s infinite;vertical-align:middle;}
.pn-banner{border-radius:12px;padding:14px 16px;background:linear-gradient(135deg,rgba(88,166,255,.1),rgba(188,140,255,.08));border:1px solid rgba(88,166,255,.25);}
.notif-dot{width:8px;height:8px;background:var(--red);border-radius:50%;display:inline-block;}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--text2);}
.spin{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:800px 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.search-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.tag{padding:2px 8px;border-radius:20px;font-size:12px;background:var(--bg3);border:1px solid var(--border);}

/* ── API Key Banner ── */
.api-key-banner{background:rgba(31,111,235,.08);border:1px solid rgba(88,166,255,.3);border-radius:10px;padding:16px;margin-bottom:16px;}
.api-key-banner.warning{background:rgba(248,81,73,.08);border-color:rgba(248,81,73,.3);}
.api-key-banner.success{background:rgba(63,185,80,.08);border-color:rgba(63,185,80,.3);}
/* ── Daily Mission ── */
.mission-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;background:var(--bg3);margin-bottom:8px;transition:all .2s;border:1px solid var(--border);}
.mission-item.done{opacity:.5;background:var(--bg);}
.mission-check{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;font-size:14px;}
.mission-check.done{background:var(--green);border-color:var(--green);color:#fff;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.pop{animation:pop .3s ease;}
/* ── Appointment ── */
.appt-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;transition:border-color .15s;}
.appt-card:hover{border-color:var(--blue2);}
.appt-card.urgent{border-left:3px solid var(--red);}
.appt-card.soon{border-left:3px solid var(--yellow);}
.appt-card.done-appt{opacity:.5;}
/* ── Ranking ── */
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--bg3);margin-bottom:6px;border:1px solid transparent;transition:all .2s;}
.rank-row.me{background:rgba(88,166,255,.08);border-color:rgba(88,166,255,.25);}
.rank-medal{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;}
/* ── Reminder Toast ── */
.reminder-toast{position:fixed;top:66px;left:50%;transform:translateX(-50%);background:var(--bg2);border:2px solid var(--yellow);border-radius:12px;padding:12px 18px;z-index:9998;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:280px;max-width:340px;animation:slideDown .3s ease;}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>

function parseDateStr(d){const s=String(d||'');if(!s)return null;if(s.includes('T')){const dt=new Date(s);return isNaN(dt)?null:dt;}const m=s.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);if(m)return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]),parseInt(m[4]),parseInt(m[5]));return null;}

function calcCaseScore(c){
  let score=50;
  const contact=String(c.contact||'');
  if(contact&&!contact.startsWith('data:')&&contact.length>3)score+=15;
  const goodSt=['ไปต่อได้','จอง','รอเซ็นต์','รอผล','อนุมัติ'];
  const badSt=['ติดต่อไม่ได้','ยังไม่สะดวก'];
  if(goodSt.includes(c.status))score+=20;
  if(badSt.includes(c.status))score-=15;
  const dt=parseDateStr(c.updatedat);
  if(dt){const days=Math.floor((Date.now()-dt.getTime())/86400000);score-=Math.min(days*5,40);}
  if(String(c.report||'').length>30)score+=10;
  return Math.max(0,Math.min(100,score));
}
function getScoreColor(s){return s>=70?'var(--green)':s>=45?'var(--yellow)':'var(--red)';}

const _cache={};const CACHE_TTL=30000;
function cacheKey(action,data){return action+':'+JSON.stringify(data||{});}
function cacheGet(action,data){const k=cacheKey(action,data);const c=_cache[k];if(c&&(Date.now()-c.ts)<CACHE_TTL)return c.data;return null;}
function cacheSet(action,data,result){_cache[cacheKey(action,data)]={data:result,ts:Date.now()};}
function cacheClear(patterns){(patterns||[]).forEach(p=>{Object.keys(_cache).forEach(k=>{if(k.startsWith(p))delete _cache[k];});});}

const CACHEABLE=['getCases','getMarket','getUsers','getBookings','getDashboard','getNotifications','getClaimedCases'];
const INVALIDATE_MAP={addCase:['getCases','getDashboard'],updateCase:['getCases','getDashboard'],sendToMarket:['getCases','getMarket','getDashboard'],claimCase:['getMarket','getClaimedCases','getDashboard'],returnCase:['getMarket','getClaimedCases'],updateClaimed:['getClaimedCases'],closeMarketCase:['getMarket','getCases'],adminChangeSales:['getCases'],adminPullCase:['getCases'],deleteCase:['getCases','getMarket','getDashboard'],addBooking:['getBookings'],updateBooking:['getBookings']};

async function api(action,data={}){
  if(CACHEABLE.includes(action)){const cached=cacheGet(action,data);if(cached)return cached;}
  try{const result=await sbApi(action,data);if(CACHEABLE.includes(action)&&result.success)cacheSet(action,data,result);if(INVALIDATE_MAP[action])cacheClear(INVALIDATE_MAP[action]);return result;}catch(e){return{success:false,error:e.toString()};}
}

function nowTH(){const d=new Date(),p=n=>String(n).padStart(2,'0');return `${p(d.getDate())}/${p(d.getMonth()+1)}/${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;}

async function sbQ(method,table,q={},body=null){
  const url=new URL(`${SUPA_URL}/rest/v1/${table}`);
  Object.entries(q).forEach(([k,v])=>url.searchParams.set(k,String(v)));
  const h={'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Range':'0-4999'};
  if(method!=='GET')h['Prefer']='return=representation';
  const opts={method,headers:h};if(body!==null)opts.body=JSON.stringify(body);
  const r=await fetch(url.toString(),opts);
  if(r.status===204)return[];const t=await r.text();try{return JSON.parse(t);}catch(e){return[];}
}

function mapMarket(r){return{ID:r.id,name:r.name,contact:r.contact,report:r.report,status:r.status,old_sales:r.old_sales,ExpiredSales:r.expiredsales||'',PoolStatus:r.poolstatus};}

async function genCaseId(){
  const d=new Date(),pre=String(d.getFullYear()).slice(-2)+String(d.getMonth()+1).padStart(2,'0');
  const rows=await sbQ('GET','cases',{select:'caseid',caseid:`like.${pre}*`,order:'caseid.desc',limit:'1'});
  let max=0;if(rows?.length){const id=String(rows[0].caseid||'');if(id.startsWith(pre))max=parseInt(id.slice(4))||0;}
  return pre+String(max+1).padStart(3,'0');
}

async function getSmartAssignSales(){
  const [users,cs]=await Promise.all([sbQ('GET','users',{role:'eq.Sales',status:'eq.active',select:'name'}),sbQ('GET','cases',{caseid:`like.${String(new Date().getFullYear()).slice(-2)+String(new Date().getMonth()+1).padStart(2,'0')}*`,select:'sales,status'})]);
  const salesList=(users||[]).map(u=>u.name);if(!salesList.length)return null;
  const CLOSED=['ปิดเคส','รีเจค','ปล่อยแล้ว','ได้รถจากที่อื่น','โยนเคส'];
  const stats={};salesList.forEach(s=>stats[s]={total:0,closed:0,active:0});
  (cs||[]).forEach(c=>{if(!stats[c.sales])return;stats[c.sales].total++;CLOSED.includes(c.status)?stats[c.sales].closed++:stats[c.sales].active++;});
  let best=null,bsc=-1;salesList.forEach(s=>{const st=stats[s];const sc=(st.total>0?st.closed/st.total:0)*0.7+(1/(st.active+1))*0.3;if(sc>bsc){bsc=sc;best=s;}});
  return best||salesList[0];
}

function ApiKeyManager({onKeyReady}){
  const [key, setKey] = useState(getAnthropicKey);
  const [input, setInput] = useState('');
  const [saved, setSaved] = useState(false);

  useEffect(()=>{ if(key) onKeyReady(key); },[key]);

  function handleSave(){
    const k = input.trim();
    if(!k.startsWith('sk-ant-')){ alert('API Key ต้องขึ้นต้นด้วย sk-ant-'); return; }
    saveAnthropicKey(k);
    setKey(k);
    setSaved(true);
    onKeyReady(k);
    setTimeout(()=>setSaved(false), 3000);
  }

  if(key) return <div className="api-key-banner success" style={{marginBottom:12,display:'flex',alignItems:'center',gap:10,padding:'10px 14px'}}>
    <span style={{fontSize:16}}>🔑</span>
    <span style={{fontSize:12,color:'var(--green)',flex:1}}>API Key พร้อมใช้งานแล้ว</span>
    <button className="btn btn-ghost" style={{fontSize:11,padding:'3px 10px'}} onClick={()=>{saveAnthropicKey('');setKey('');setInput('');}}>เปลี่ยน Key</button>
  </div>;

  return <div className="api-key-banner warning" style={{marginBottom:16}}>
    <div style={{fontWeight:700,fontSize:13,marginBottom:6,display:'flex',alignItems:'center',gap:6}}><Ico.key/> ต้องการ Anthropic API Key ก่อนใช้ AI</div>
    <div style={{fontSize:12,color:'var(--text2)',marginBottom:10,lineHeight:1.6}}>
      หา key ได้ที่ <strong>console.anthropic.com</strong> → API Keys → Create Key<br/>
      Key จะขึ้นต้นด้วย <code style={{background:'var(--bg3)',padding:'1px 6px',borderRadius:4}}>sk-ant-...</code>
    </div>
    <div style={{display:'flex',gap:8}}>
      <input type="password" value={input} onChange={e=>setInput(e.target.value)}
        onKeyDown={e=>e.key==='Enter'&&handleSave()}
        placeholder="sk-ant-api03-..." style={{flex:1,fontSize:12}}/>
      <button className="btn btn-primary" style={{fontSize:12,padding:'8px 14px',whiteSpace:'nowrap'}} onClick={handleSave}>
        {saved?'✅ บันทึก!':'บันทึก'}
      </button>
    </div>
  </div>;
}

function HistoryModal({caseId,onClose}){
  const [rows,setRows]=useState([]);const [loading,setLoading]=useState(true);
  useEffect(()=>{api('getHistory',{caseId}).then(r=>{if(r.success)setRows(r.data||[]);setLoading(false);});},[caseId]);
  function getActionStyle(action){const a=String(action||'').trim();if(a.includes('เพิ่มเคส'))return{icon:'✨',bg:'rgba(63,185,80,.15)',border:'rgba(63,185,80,.4)',color:'var(--green)'};if(a.includes('แก้ไข'))return{icon:'✏️',bg:'rgba(88,166,255,.12)',border:'rgba(88,166,255,.35)',color:'var(--blue)'};if(a.includes('ส่งตลาด'))return{icon:'⬆️',bg:'rgba(210,153,34,.15)',border:'rgba(210,153,34,.4)',color:'var(--yellow)'};if(a.includes('รับเคส'))return{icon:'🤝',bg:'rgba(188,140,255,.15)',border:'rgba(188,140,255,.4)',color:'var(--purple)'};if(a.includes('คืนเคส'))return{icon:'↩️',bg:'rgba(255,166,87,.15)',border:'rgba(255,166,87,.4)',color:'var(--orange)'};if(a.includes('ปิดเคส'))return{icon:'🔒',bg:'rgba(248,81,73,.12)',border:'rgba(248,81,73,.35)',color:'var(--red)'};return{icon:'📝',bg:'rgba(139,148,158,.12)',border:'rgba(139,148,158,.3)',color:'var(--text2)'};}
  function formatDate(d){const s=String(d||'');if(s.includes('T')){const dt=new Date(s);if(!isNaN(dt)){return[`${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getFullYear()).slice(-2)}`,`${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`];}}const m=s.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);if(m)return[`${m[1]}/${m[2]}/${String(m[3]).slice(-2)}`,`${m[4]}:${m[5]}`];return[s,''];}
  const grouped=rows.reduce((acc,h)=>{const[date]=formatDate(h['วันที่']);if(!acc[date])acc[date]=[];acc[date].push(h);return acc;},{});
  return <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="modal" style={{maxWidth:500,borderRadius:14}}>
      <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:4,height:22,background:'var(--purple)',borderRadius:2,flexShrink:0}}/>
        <span style={{fontWeight:700,fontSize:15}}>Timeline เคส {caseId}</span>
        <button className="btn btn-ghost" style={{padding:'4px 8px',marginLeft:'auto'}} onClick={onClose}><Ico.x/></button>
      </div>
      <div style={{padding:'16px 20px',maxHeight:'75vh',overflowY:'auto'}}>
        {loading?<SkeletonCards n={3}/>:rows.length===0?<div style={{textAlign:'center',padding:'40px 0',color:'var(--text2)'}}><div style={{fontSize:36,marginBottom:8}}>📭</div><div>ยังไม่มีประวัติ</div></div>:
        Object.entries(grouped).map(([date,items],gi)=><div key={gi} style={{marginBottom:20}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}><div style={{fontSize:11,fontWeight:700,color:'var(--text3)',background:'var(--bg3)',border:'1px solid var(--border)',padding:'3px 10px',borderRadius:20,whiteSpace:'nowrap'}}>📅 {date}</div><div style={{flex:1,height:1,background:'var(--border)'}}/></div>
          <div style={{position:'relative',paddingLeft:44}}>
            {items.length>1&&<div style={{position:'absolute',left:17,top:20,bottom:20,width:2,background:'var(--border)',borderRadius:1}}/>}
            {items.map((h,i)=>{const st=getActionStyle(h.action);const[,time]=formatDate(h['วันที่']);return <div key={i} style={{position:'relative',marginBottom:i<items.length-1?16:0}}>
              <div style={{position:'absolute',left:-44,width:34,height:34,borderRadius:'50%',background:st.bg,border:`2px solid ${st.border}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,flexShrink:0,boxShadow:'0 0 0 3px var(--bg2)'}}>{st.icon}</div>
              <div style={{background:'var(--bg3)',border:`1px solid var(--border)`,borderLeft:`3px solid ${st.border}`,borderRadius:8,padding:'10px 14px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8,marginBottom:4}}><div style={{fontSize:13,fontWeight:700,color:st.color}}>{h.action}</div><div style={{fontSize:11,color:'var(--text3)',whiteSpace:'nowrap',flexShrink:0}}>{time}</div></div>
                {h.detail&&<div style={{fontSize:12,color:'var(--text2)',marginBottom:4,lineHeight:1.5}}>{h.detail}</div>}
                <div style={{fontSize:11,color:'var(--text3)'}}><span style={{background:'rgba(88,166,255,.1)',color:'var(--blue)',padding:'1px 7px',borderRadius:20,fontWeight:600}}>{h['เซลส์']||'ระบบ'}</span></div>
              </div>
            </div>;})}
          </div>
        </div>)}
      </div>
    </div>
  </div>;
}

function CaseModal({caseData,users,currentUser,onClose,onUpdated}){
  const [status,setStatus]=useState(caseData.status||caseData.newstatus||'รอข้อมูล');
  const [report,setReport]=useState(caseData.report||'');
  const [editReport,setEditReport]=useState(false);
  const [showHistory,setShowHistory]=useState(false);
  const [newSales,setNewSales]=useState(caseData.sales||caseData.sale||'');
  const [notes,setNotes]=useState([]);
  const [addingNote,setAddingNote]=useState(false);
  const [newNote,setNewNote]=useState('');
  const [confirmDel,setConfirmDel]=useState(false);
  const isAdmin=currentUser.role==='Admin';
  const isClaimed=!!caseData.fromsales;
  const caseId=caseData.caseid||caseData.caseID;
  const contactRaw=caseData.contact||'';
  const contactVal=formatContact(contactRaw);
  const isQR=contactRaw.startsWith('http')||contactRaw.startsWith('data:image');
  useEffect(()=>{try{const d=JSON.parse(localStorage.getItem('cnotes_'+caseId)||'[]');setNotes(Array.isArray(d)?d:[]);}catch(e){setNotes([]);}},[caseId]);
  function saveNote(){if(!newNote.trim())return;const upd=[...notes,{text:newNote.trim(),date:new Date().toLocaleString('th-TH'),by:currentUser.name}];setNotes(upd);try{localStorage.setItem('cnotes_'+caseId,JSON.stringify(upd));}catch(e){}setNewNote('');setAddingNote(false);}
  function deleteNote(i){const upd=notes.filter((_,idx)=>idx!==i);setNotes(upd);try{localStorage.setItem('cnotes_'+caseId,JSON.stringify(upd));}catch(e){}}
  async function save(){
    const optimisticData=isClaimed?{...caseData,newstatus:status}:{...caseData,status,report:editReport?report:caseData.report,sales:(isAdmin&&newSales)?newSales:caseData.sales};
    onUpdated(optimisticData);onClose();
    try{if(isClaimed){await api('updateClaimed',{caseId,newstatus:status,Notes:'',sales:currentUser.name});}else{const upd={caseid:caseId,status,changedBy:currentUser.name,detail:'เปลี่ยนสถานะเป็น '+status};if(editReport)upd.report=report;await api('updateCase',upd);if(isAdmin&&newSales&&newSales!==caseData.sales)await api('adminChangeSales',{caseId,newSales});}}catch(e){}
  }
  async function saveReport(){if(!report.trim())return;setEditReport(false);onUpdated({...caseData,report});onClose();try{await api('updateCase',{caseid:caseId,report,changedBy:currentUser.name,detail:'แก้ไขรีพอร์ต'});}catch(e){}}
  async function doDelete(){onClose();const r=await api('deleteCase',{caseId,caseid:caseId,deletedBy:currentUser.name});cacheClear(['getCases','getMarket','getDashboard','getClaimedCases','getHistory','getNotifications']);if(r.success){onUpdated();}else{alert('เกิดข้อผิดพลาด: '+(r.error||'ไม่สามารถลบได้'));}}
  if(showHistory)return <HistoryModal caseId={caseId} onClose={()=>setShowHistory(false)}/>;

    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>

        <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:10}}><div style={{width:4,height:22,background:'var(--blue)',borderRadius:2,flexShrink:0}}/><span style={{fontWeight:700,fontSize:15}}>ข้อมูลลูกค้า</span><button className="btn btn-ghost" style={{padding:'4px 8px',marginLeft:'auto'}} onClick={onClose}><Ico.x/></button></div>
        <div style={{padding:'16px 20px',overflowY:'auto',maxHeight:'calc(90vh - 190px)'}}>
          <div style={{marginBottom:14,display:'grid',gap:9}}>
            <div style={{fontSize:14}}><span style={{color:'var(--text2)'}}>รหัสเคส: </span><span style={{fontWeight:700,color:'var(--blue)'}}>{caseId}</span></div>
            <div style={{fontSize:14,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}><span style={{color:'var(--text2)'}}>ชื่อลูกค้า: </span><span style={{fontWeight:600}}>{caseData.customername||caseData.name||'-'}</span>{(caseData.customername||caseData.name)&&<button className="btn btn-primary" style={{padding:'3px 14px',fontSize:12,borderRadius:20}} onClick={()=>copyText(caseData.customername||caseData.name||'')}>Copy</button>}</div>
            <div style={{fontSize:14,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}><span style={{color:'var(--text2)'}}>ติดต่อ: </span>{isQR?<div style={{marginTop:6,width:'100%'}}><img src={contactRaw} alt="QR" style={{maxWidth:'100%',maxHeight:220,borderRadius:8,border:'1px solid var(--border)',background:'var(--bg3)',display:'block'}} onError={e=>{e.target.style.display='none';}}/></div>:<><span style={{fontWeight:600}}>{contactVal||'-'}</span></>}</div>
            {!isQR&&contactVal&&<div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:2}}>
              <button className="contact-action-btn" style={{background:'rgba(88,166,255,.15)',color:'var(--blue)'}} onClick={()=>copyText(contactVal)}>📋 คัดลอก</button>
              {/^\d{9,10}$/.test(contactVal.replace(/\D/g,''))&&<a href={`tel:${contactVal}`} className="contact-action-btn" style={{background:'rgba(63,185,80,.15)',color:'var(--green)',textDecoration:'none'}}><Ico.phone/> โทรทันที</a>}

function ImageUploader({value,onChange,caseId='',label='📷',accept='image/*',maxMB=10}){
  const [status,setStatus]=useState('');const [preview,setPreview]=useState(()=>value||'');const fileRef=useRef();
  const prevRef=useRef(value);useEffect(()=>{if(!value&&prevRef.current){setPreview('');setStatus('');}prevRef.current=value;},[value]);
  function compressImage(file){return new Promise(resolve=>{const reader=new FileReader();reader.onload=ev=>{const img=new Image();img.onload=()=>{const MAX=800;let w=img.width,h=img.height;if(w>MAX||h>MAX){const r=Math.min(MAX/w,MAX/h);w=Math.round(w*r);h=Math.round(h*r);}const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);resolve(canvas.toDataURL('image/jpeg',0.80));};img.onerror=()=>resolve(ev.target.result);img.src=ev.target.result;};reader.onerror=()=>resolve('');reader.readAsDataURL(file);});}
  async function handleFile(e){const file=e.target.files[0];if(!file)return;if(!file.type.startsWith('image/'))return alert('กรุณาเลือกไฟล์รูปภาพ');if(file.size>maxMB*1024*1024)return alert(`ไฟล์ต้องไม่เกิน ${maxMB}MB`);setStatus('compressing');const compressed=await compressImage(file);if(!compressed){setStatus('error');return;}setPreview(compressed);onChange(compressed);setStatus('done');}
  function handlePaste(e){const items=e.clipboardData?.items||[];for(const item of items){if(item.type.startsWith('image/')){handleFile({target:{files:[item.getAsFile()]}});}}}
  function clear(e){e.stopPropagation();e.preventDefault();setPreview('');onChange('');setStatus('');if(fileRef.current)fileRef.current.value='';}
  return <div onPaste={handlePaste}><input ref={fileRef} type="file" accept={accept} style={{display:'none'}} onChange={handleFile}/>{preview?<div style={{position:'relative',display:'inline-block',width:'100%'}}><img src={preview} alt="รูปภาพ" style={{width:'100%',maxHeight:220,objectFit:'contain',borderRadius:8,border:'1px solid var(--border)',background:'var(--bg3)',display:'block'}} onError={e=>{e.target.style.opacity='0.3';}}/><button type="button" onClick={clear} style={{position:'absolute',top:6,right:6,background:'rgba(0,0,0,.65)',border:'none',borderRadius:'50%',width:26,height:26,color:'#fff',cursor:'pointer',fontSize:15,display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>✕</button></div>:<div style={{display:'flex',gap:8,flexDirection:'column'}}><button type="button" className="btn btn-ghost" style={{width:'100%',padding:'14px',display:'flex',flexDirection:'column',alignItems:'center',gap:6,border:'2px dashed var(--border)',borderRadius:8}} onClick={()=>fileRef.current?.click()}><span style={{fontSize:28}}>{label}</span><span style={{fontSize:13}}>แตะเพื่อเลือกรูป</span><span style={{fontSize:11,color:'var(--text3)'}}>JPG, PNG สูงสุด {maxMB}MB</span></button><input value={value||''} onChange={e=>onChange(e.target.value)} placeholder="หรือวาง URL รูปภาพ" style={{fontSize:13}}/></div>}</div>;
}
function QrUploader({value,onChange,caseId=''}){return <ImageUploader value={value} onChange={onChange} caseId={caseId} label="📷" maxMB={10}/>;}

function useChartJs(cb,deps){useEffect(()=>{if(window.Chart){cb();return;}const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js';s.onload=()=>cb();document.head.appendChild(s);},deps);}

function BarChart({id,labels,datasets,horizontal=false}){const ref=useRef();const inst=useRef();useChartJs(()=>{inst.current?.destroy();if(!ref.current)return;Chart.defaults.color='#8b949e';inst.current=new Chart(ref.current,{type:'bar',data:{labels,datasets:datasets.map(d=>({...d,borderRadius:5,borderSkipped:false}))},options:{indexAxis:horizontal?'y':'x',responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:16,font:{size:12}}},tooltip:{callbacks:{label:c=>' '+c.dataset.label+': '+c.raw}}},scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{font:{size:12}}},y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{font:{size:12},stepSize:1,precision:0}}}}});},  [labels,datasets]);useEffect(()=>()=>inst.current?.destroy(),[]);return <canvas ref={ref}/>;}

function DonutChart({id,labels,values,colors}){const ref=useRef();const inst=useRef();useChartJs(()=>{inst.current?.destroy();if(!ref.current)return;inst.current=new Chart(ref.current,{type:'doughnut',data:{labels,datasets:[{data:values,backgroundColor:colors,borderWidth:2,borderColor:'var(--bg2)',hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'right',labels:{boxWidth:12,padding:10,font:{size:11}}},tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw} (${Math.round(c.raw/(c.dataset.data.reduce((a,b)=>a+b,0)||1)*100)}%)`}}}}});},  [labels,values]);useEffect(()=>()=>inst.current?.destroy(),[]);return <canvas ref={ref}/>;}

function usePushNotif(apiUrl,salesName){
  const seenRef=useRef(new Set());
  useEffect(()=>{
    if(!salesName||!apiUrl)return;
    var notifPerm='';try{notifPerm=(typeof Notification!=='undefined')?Notification.permission:'';}catch(e){return;}
    try{const s=JSON.parse(localStorage.getItem('cp_seen_notifs')||'[]');seenRef.current=new Set(s);}catch(e){}
    function poll(){var perm='';try{perm=(typeof Notification!=='undefined')?Notification.permission:'';}catch(e){return;}if(perm!=='granted')return;fetch(apiUrl+'?action=getNotifications&sales='+encodeURIComponent(salesName),{method:'GET',mode:'cors'}).then(function(r){return r.json();}).then(function(j){var fresh=(j.data||[]).filter(function(n){return n['สถานะ']==='unread'&&!seenRef.current.has(n.notifId);});if(fresh.length>0){fresh.forEach(function(n){seenRef.current.add(n.notifId);});try{localStorage.setItem('cp_seen_notifs',JSON.stringify([...seenRef.current]));}catch(e){}var body=fresh.length===1?fresh[0].message:fresh.length+' การแจ้งเตือนใหม่';try{new Notification('🚗 CasePool',{body:body,icon:'https://raw.githubusercontent.com/umhomecar03-cmyk/umhomecar/main/do.png',tag:'casepool',renotify:true});}catch(e){}}}).catch(function(){});};
    window.cpTriggerPushPoll=function(delayMs){setTimeout(poll,delayMs||1500);};var t=setInterval(poll,120000);return function(){clearInterval(t);window.cpTriggerPushPoll=null;};
  },[apiUrl,salesName]);
}

function PushNotifBanner({currentUser}){

function GlobalSearch({currentUser,onClose,onNavigate}){
  const [q,setQ]=useState('');const [results,setResults]=useState([]);const [loading,setLoading]=useState(false);const inputRef=useRef();
  useEffect(()=>{setTimeout(()=>inputRef.current?.focus(),80);},[]);
  useEffect(()=>{if(q.trim().length<2){setResults([]);return;}setLoading(true);const t=setTimeout(async()=>{const[cr,ccr]=await Promise.all([api('searchCases',{q:q.trim()}),api('getClaimedCases',{sales:currentUser.name})]);const myCases=(cr.success?(cr.data||[]):[]).filter(c=>c.sales===currentUser.name).map(c=>({...c,_type:'cases'}));const claimed=(ccr.success?(ccr.data||[]):[]).filter(c=>{const lq=q.toLowerCase();return String(c.caseID||'').toLowerCase().includes(lq)||String(c.customername||'').toLowerCase().includes(lq)||String(formatContact(c.contact)||'').includes(lq);}).map(c=>({...c,caseid:c.caseID,status:c.newstatus||c.status,_type:'claimed'}));const seen=new Set();const merged=[...myCases,...claimed].filter(c=>{if(seen.has(c.caseid))return false;seen.add(c.caseid);return true;});setResults(merged);setLoading(false);},380);return()=>clearTimeout(t);},[q,currentUser.name]);

function SalesDashboard({currentUser}){
  const [data,setData]=useState(null);const [allCases,setAllCases]=useState([]);const [loading,setLoading]=useState(true);const [editTarget,setEditTarget]=useState(false);const [targetInput,setTargetInput]=useState('');

  const load=useCallback(()=>{cacheClear(['getDashboard']);setTargetInput(String(getTarget()||''));Promise.all([api('getDashboard',{role:'Sales',sales:currentUser.name}),api('getCases',{sales:currentUser.name,all:'true'})]).then(([dr,cr])=>{if(dr.success)setData(dr.data);if(cr.success)setAllCases(cr.data||[]);setLoading(false);});},[currentUser.name]);

  function parseStartDate(startdate){if(!startdate&&startdate!==0)return null;const s=String(startdate).trim();if(!s)return null;if(/^\d{4,6}$/.test(s)){const d=new Date((parseInt(s)-25569)*86400000);if(!isNaN(d))return d;}if(s.includes('/')){const p=s.split('/');if(p.length>=3){const p0=parseInt(p[0]),p1=parseInt(p[1]),p2=parseInt(p[2]);if(p[2].length===4){const d=new Date(p2,p1-1,p0);if(!isNaN(d))return d;}const d2=new Date(p2,p0-1,p1);if(!isNaN(d2))return d2;}}const d=new Date(s);return isNaN(d)?null:d;}

  const startdate=data?.startdate||currentUser.startdate;const daysWorked=calcDays(startdate);const yearsMonths=daysWorked!=null?(()=>{const y=Math.floor(daysWorked/365),m=Math.floor((daysWorked%365)/30),d=daysWorked%30;if(y>0&&m>0)return`${y} ปี ${m} เดือน`;if(y>0)return`${y} ปี`;if(m>0&&d>0)return`${m} เดือน ${d} วัน`;if(m>0)return`${m} เดือน`;return`${daysWorked} วัน`;})():null;

// ============================================================
function getMissionKey(userId){const d=new Date();return`cp_missions_${userId}_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;}
function getStreakKey(userId){return`cp_streak_${userId}`;}
function loadMissions(userId){
  const key=getMissionKey(userId);
  const DEFAULT=[
    {id:'m1',icon:'📞',title:'โทรหาลูกค้า 3 เคส',target:3,current:0,done:false},
    {id:'m2',icon:'📝',title:'อัปเดตสถานะเคส 2 ครั้ง',target:2,current:0,done:false},
    {id:'m3',icon:'🏪',title:'เช็คตลาดเคส',target:1,current:0,done:false},
    {id:'m4',icon:'⚡',title:'Follow up เคสค้าง 1 เคส',target:1,current:0,done:false},
  ];
  try{const s=localStorage.getItem(key);return s?JSON.parse(s):DEFAULT;}catch(e){return DEFAULT;}
}
function saveMissions(userId,missions){try{localStorage.setItem(getMissionKey(userId),JSON.stringify(missions));}catch(e){}}
function loadStreak(userId){try{const s=localStorage.getItem(getStreakKey(userId));return s?JSON.parse(s):{count:0,lastDate:''};}catch(e){return{count:0,lastDate:''};}}
function saveStreak(userId,streak){try{localStorage.setItem(getStreakKey(userId),JSON.stringify(streak));}catch(e){}}

function DailyMissionBlock({currentUser,onMissionComplete}){
  const [missions,setMissions]=useState(()=>loadMissions(currentUser.userId));
  const [streak,setStreak]=useState(()=>loadStreak(currentUser.userId));
  const [popping,setPopping]=useState(null);
  const doneCount=missions.filter(m=>m.done).length;
  const allDone=doneCount===missions.length;

  function toggleMission(id){
    const updated=missions.map(m=>{
      if(m.id!==id)return m;
      const newDone=!m.done;
      const newCurrent=newDone?m.target:Math.max(0,m.current-1);
      return{...m,done:newDone,current:newCurrent};
    });
    setMissions(updated);
    saveMissions(currentUser.userId,updated);
    setPopping(id);setTimeout(()=>setPopping(null),400);
    // Check if all done → update streak
    const nowAllDone=updated.every(m=>m.done);
    if(nowAllDone){
      const today=new Date().toISOString().split('T')[0];
      const yesterday=new Date(Date.now()-86400000).toISOString().split('T')[0];
      const newStreak={count:streak.lastDate===yesterday?streak.count+1:1,lastDate:today};
      setStreak(newStreak);saveStreak(currentUser.userId,newStreak);
    }
    if(onMissionComplete)onMissionComplete();
  }

  // increment a specific mission counter (called from outside)
  window['cp_mission_inc']=function(missionId){
    setMissions(prev=>{
      const updated=prev.map(m=>{
        if(m.id!==missionId||m.done)return m;
        const newCurrent=Math.min(m.current+1,m.target);
        return{...m,current:newCurrent,done:newCurrent>=m.target};
      });
      saveMissions(currentUser.userId,updated);
      return updated;
    });
  };

  return <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,padding:'14px 16px',marginBottom:14}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <div style={{fontWeight:700,fontSize:14}}>🎯 Daily Mission</div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        {streak.count>0&&<div style={{display:'flex',alignItems:'center',gap:4,background:'rgba(255,166,87,.1)',border:'1px solid rgba(255,166,87,.3)',borderRadius:20,padding:'2px 10px',fontSize:12,fontWeight:700,color:'var(--orange)'}}>🔥 {streak.count} วันติด</div>}
        <div style={{fontSize:12,color:allDone?'var(--green)':'var(--text2)',fontWeight:600}}>{doneCount}/{missions.length}</div>
      </div>
    </div>
    {/* Progress bar */}
    <div style={{height:6,background:'var(--bg3)',borderRadius:3,overflow:'hidden',marginBottom:12}}>
      <div style={{height:'100%',borderRadius:3,background:allDone?'var(--green)':'var(--blue)',width:`${(doneCount/missions.length)*100}%`,transition:'width .4s'}}/>
    </div>
    {missions.map(m=><div key={m.id} className={`mission-item${m.done?' done':''}`}>
      <div className={`mission-check${m.done?' done':''}${popping===m.id?' pop':''}`} onClick={()=>toggleMission(m.id)}>
        {m.done?'✓':''}
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:600,textDecoration:m.done?'line-through':'none',color:m.done?'var(--text3)':'var(--text)'}}>{m.icon} {m.title}</div>
        {m.target>1&&!m.done&&<div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{m.current}/{m.target}</div>}
      </div>
    </div>)}
    {allDone&&<div style={{textAlign:'center',padding:'8px 0 2px',fontSize:13,color:'var(--green)',fontWeight:700}}>🎉 ทำครบทุก Mission วันนี้แล้ว!</div>}
  </div>;
}

function getApptKey(userId){return`cp_appts_${userId}`;}
function loadAppts(userId){try{const s=localStorage.getItem(getApptKey(userId));return s?JSON.parse(s):[];}catch(e){return[];}}
function saveAppts(userId,appts){try{localStorage.setItem(getApptKey(userId),JSON.stringify(appts));}catch(e){}}

function AddApptModal({currentUser,cases,onClose,onAdded}){
  const [form,setForm]=useState({caseId:'',customerName:'',datetime:'',note:'',done:false});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  // Pre-fill default datetime to next hour
  useEffect(()=>{const d=new Date();d.setHours(d.getHours()+1,0,0,0);const pad=n=>String(n).padStart(2,'0');set('datetime',`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:00`);if(cases.length>0)set('caseId',cases[0].caseid||'');},[]);
  // Auto-fill customer name when case selected
  useEffect(()=>{if(!form.caseId)return;const c=cases.find(x=>x.caseid===form.caseId);if(c)set('customerName',c.customername||'');},[form.caseId]);

  function save(){
    if(!form.datetime)return alert('กรุณาเลือกวันที่นัด');
    const appts=loadAppts(currentUser.userId);
    const newAppt={...form,id:'A'+Date.now(),createdAt:new Date().toISOString()};
    saveAppts(currentUser.userId,[...appts,newAppt]);
    onAdded();onClose();
  }
  return <Modal title="📅 เพิ่มนัดหมาย" onClose={onClose} footer={<><button className="btn btn-ghost" onClick={onClose}>ยกเลิก</button><button className="btn btn-primary" onClick={save}>💾 บันทึก</button></>}>
    <div style={{display:'grid',gap:12}}>
      <div className="form-group"><label>เลือกเคส</label>
        <select value={form.caseId} onChange={e=>set('caseId',e.target.value)}>
          <option value="">-- เลือกเคส --</option>
          {cases.map(c=><option key={c.caseid} value={c.caseid}>[{c.caseid}] {c.customername}</option>)}
        </select>
      </div>
      <div className="form-group"><label>ชื่อลูกค้า</label><input value={form.customerName} onChange={e=>set('customerName',e.target.value)} placeholder="ชื่อลูกค้า"/></div>
      <div className="form-group"><label>วันเวลานัด</label><input type="datetime-local" value={form.datetime} onChange={e=>set('datetime',e.target.value)}/></div>
      <div className="form-group"><label>หมายเหตุ</label><textarea rows={2} value={form.note} onChange={e=>set('note',e.target.value)} placeholder="รายละเอียดนัด..."/></div>
    </div>
  </Modal>;
}

function AppointmentPage({currentUser}){
  const [appts,setAppts]=useState([]);const [showAdd,setShowAdd]=useState(false);const [cases,setCases]=useState([]);const [now,setNow]=useState(Date.now());
  const CLOSED=['ปิดเคส','รีเจค','ปล่อยแล้ว','ได้รถจากที่อื่น','โยนเคส'];
  useEffect(()=>{setAppts(loadAppts(currentUser.userId));api('getCases',{sales:currentUser.name,all:'true'}).then(r=>{if(r.success)setCases((r.data||[]).filter(c=>!CLOSED.includes(c.status)));});},[]);
  useEffect(()=>{const t=setInterval(()=>{setNow(Date.now());setAppts(loadAppts(currentUser.userId));},30000);return()=>clearInterval(t);},[]);

  function reload(){setAppts(loadAppts(currentUser.userId));}
  function toggleDone(id){const updated=appts.map(a=>a.id===id?{...a,done:!a.done}:a);saveAppts(currentUser.userId,updated);setAppts(updated);}
  function deleteAppt(id){if(!confirm('ลบนัดนี้?'))return;const updated=appts.filter(a=>a.id!==id);saveAppts(currentUser.userId,updated);setAppts(updated);}

  function getApptStatus(a){
    if(a.done)return{label:'✅ เสร็จแล้ว',color:'var(--green)',cls:'done-appt'};
    if(!a.datetime)return{label:'',color:'var(--text3)',cls:''};
    const ms=new Date(a.datetime).getTime()-now;
    if(ms<0)return{label:'⏰ เลยเวลาแล้ว',color:'var(--red)',cls:'urgent'};
    if(ms<1800000)return{label:`⚡ อีก ${Math.ceil(ms/60000)} นาที`,color:'var(--yellow)',cls:'soon'};
    if(ms<3600000)return{label:`🔔 อีก ${Math.ceil(ms/60000)} นาที`,color:'var(--yellow)',cls:'soon'};
    const h=Math.floor(ms/3600000);const d=Math.floor(ms/86400000);
    if(d>0)return{label:`📅 อีก ${d} วัน`,color:'var(--text2)',cls:''};
    return{label:`⏱ อีก ${h} ชม.`,color:'var(--blue)',cls:''};
  }
  function formatApptTime(dt){if(!dt)return'-';const d=new Date(dt);return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}

  const sorted=[...appts].sort((a,b)=>{if(a.done&&!b.done)return 1;if(!a.done&&b.done)return-1;return new Date(a.datetime||0)-new Date(b.datetime||0);});
  const upcoming=sorted.filter(a=>!a.done);const done=sorted.filter(a=>a.done);

  return <div className="page">
    <div className="page-hd">
      <div><div className="page-title">📅 นัดหมาย</div><div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>upcoming {upcoming.length} รายการ</div></div>
      <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>+ นัดใหม่</button>
    </div>
    {upcoming.length===0&&done.length===0&&<div style={{textAlign:'center',padding:'48px 0',color:'var(--text2)'}}>
      <div style={{fontSize:48,marginBottom:12}}>📅</div>
      <div style={{fontWeight:600,fontSize:15,marginBottom:6}}>ยังไม่มีนัดหมาย</div>
      <div style={{fontSize:13}}>กด + นัดใหม่ เพื่อเพิ่มนัดกับลูกค้า</div>
    </div>}
    {upcoming.map(a=>{const st=getApptStatus(a);return <div key={a.id} className={`appt-card ${st.cls}`}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
        <div>
          <div style={{fontWeight:700,fontSize:14}}>{a.customerName||'ไม่ระบุชื่อ'}{a.caseId&&<span style={{fontSize:12,color:'var(--blue)',marginLeft:8,fontWeight:400}}>{a.caseId}</span>}</div>
          <div style={{fontSize:13,color:'var(--text2)',marginTop:2}}>🕐 {formatApptTime(a.datetime)}</div>
          {a.note&&<div style={{fontSize:12,color:'var(--text3)',marginTop:4,background:'var(--bg3)',padding:'5px 8px',borderRadius:6}}>{a.note}</div>}
        </div>
        <span style={{fontSize:12,fontWeight:700,color:st.color,whiteSpace:'nowrap',marginLeft:8}}>{st.label}</span>
      </div>
      <div style={{display:'flex',gap:8,marginTop:8}}>
        <button className="btn btn-green" style={{fontSize:12,padding:'5px 14px'}} onClick={()=>toggleDone(a.id)}>✅ เสร็จแล้ว</button>
        <button className="btn btn-ghost" style={{fontSize:12,padding:'5px 10px',color:'var(--red)'}} onClick={()=>deleteAppt(a.id)}>🗑</button>
      </div>
    </div>;})}
    {done.length>0&&<><div style={{fontSize:12,color:'var(--text3)',marginTop:16,marginBottom:8,fontWeight:700}}>✅ เสร็จแล้ว ({done.length})</div>
    {done.map(a=>{const st=getApptStatus(a);return <div key={a.id} className={`appt-card ${st.cls}`}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div style={{fontWeight:600,fontSize:13,color:'var(--text3)'}}>{a.customerName||'-'}{a.caseId&&<span style={{fontSize:11,color:'var(--blue)',marginLeft:6}}>{a.caseId}</span>}</div><div style={{fontSize:11,color:'var(--text3)'}}>🕐 {formatApptTime(a.datetime)}</div></div>
        <button className="btn btn-ghost" style={{fontSize:11,padding:'3px 8px',color:'var(--red)'}} onClick={()=>deleteAppt(a.id)}>ลบ</button>
      </div>
    </div>;})}
    </>}
    {showAdd&&<AddApptModal currentUser={currentUser} cases={cases} onClose={()=>setShowAdd(false)} onAdded={reload}/>}
  </div>;
}

// ── Reminder checker hook ──
function useApptReminder(userId,salesName){
  const [reminderToast,setReminderToast]=useState(null);
  const notifiedRef=useRef(new Set());
  useEffect(()=>{
    if(!userId)return;
    function check(){
      const appts=loadAppts(userId);
      const now=Date.now();
      appts.forEach(a=>{
        if(a.done||!a.datetime||notifiedRef.current.has(a.id))return;
        const ms=new Date(a.datetime).getTime()-now;
        if(ms>0&&ms<=1800000){// within 30 min
          notifiedRef.current.add(a.id);
          setReminderToast({appt:a,ms});
          setTimeout(()=>setReminderToast(null),8000);
          try{if(Notification.permission==='granted')new Notification('📅 นัดหมายใกล้ถึงแล้ว!',{body:`${a.customerName||''} — อีก ${Math.ceil(ms/60000)} นาที`,icon:'https://raw.githubusercontent.com/umhomecar03-cmyk/umhomecar/main/do.png'});}catch(e){}
        }
      });
    }
    check();const t=setInterval(check,60000);return()=>clearInterval(t);
  },[userId]);
  return{reminderToast,closeReminder:()=>setReminderToast(null)};
}

// ============================================================
function DailyRankingBlock({currentUser,salesData}){
  if(!salesData||salesData.length===0)return null;
  const today=new Date();const yy=String(today.getFullYear()).slice(-2),mm=String(today.getMonth()+1).padStart(2,'0');const pre=yy+mm;

  // Sort by sold desc, then by total cases
  const ranked=[...salesData].sort((a,b)=>(b.sold||0)-(a.sold||0)||(b.currentCases||0)-(a.currentCases||0));
  const myRank=ranked.findIndex(s=>s.name===currentUser.name)+1;
  const top5=ranked.slice(0,5);

  function medalStyle(i){
    if(i===0)return{bg:'#3d2a00',color:'#ffd700',text:'🥇'};
    if(i===1)return{bg:'#1c1c2e',color:'#c0c0c0',text:'🥈'};
    if(i===2)return{bg:'#1a2a00',color:'#cd7f32',text:'🥉'};
    return{bg:'var(--bg4)',color:'var(--text2)',text:String(i+1)};
  }

  return <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,padding:'14px 16px',marginBottom:14}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
      <div style={{fontWeight:700,fontSize:14}}>🏆 Ranking เดือนนี้</div>
      {myRank>0&&<div style={{fontSize:12,background:'rgba(88,166,255,.1)',color:'var(--blue)',border:'1px solid rgba(88,166,255,.25)',borderRadius:20,padding:'2px 10px',fontWeight:700}}>คุณ #{myRank}</div>}
    </div>
    {top5.map((s,i)=>{
      const md=medalStyle(i);const isMe=s.name===currentUser.name;
      return <div key={s.name} className={`rank-row${isMe?' me':''}`}>
        <div className="rank-medal" style={{background:md.bg,color:md.color}}>{md.text}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:isMe?700:500,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:isMe?'var(--blue)':'var(--text)'}}>{s.name}{isMe&&' 👈'}</div>
          <div style={{fontSize:11,color:'var(--text3)'}}>{s.currentCases||0} เคส · ปิด {s.sold||0}</div>

const SHEET_ID = '19l-cEYR3M0NlhRUlBKPjgeHvQK9KBNnA1NeiQKBZRhA';
const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
const BANK_SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=bank`;

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 3) return [];
  // Row 0 = title, Row 1 = headers, Row 2+ = data
  const headers = lines[1].split(',').map(h => h.replace(/^"|"$/g, '').trim());
  return lines.slice(2).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    vals.push(cur.trim());
    const row = {};
    headers.forEach((h, i) => { row[h] = (vals[i] || '').replace(/^"|"$/g, '').trim(); });
    return row;
  }).filter(r => r[headers[0]] || r[headers[1]]);
}

function normalizeDate(d) {
  if (!d) return null;
  // Handle dd/mm/yyyy or dd/mm/yy or d/m/yyyy
  const m = String(d).match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (!m) return null;
  let [, dd, mo, yy] = m;
  if (yy.length === 2) yy = '25' + yy; // Buddhist year 25xx → keep as is for comparison
  // Convert Buddhist year to CE if > 2500
  const yr = parseInt(yy) > 2500 ? parseInt(yy) - 543 : parseInt(yy);
  return `${yr}-${String(mo).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
}

function fmtShortDate(d) {
  if (!d) return '';
  const m = String(d).match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (!m) return d;
  return `${m[1]}/${m[2]}/${String(m[3]).slice(-2)}`;
}

function getPlate4(plate) {
  if (!plate) return '';
  const digits = String(plate).replace(/\s/g, '');
  // Get last 4 chars
  return digits.slice(-4);
}

function AdminDailyReport() {
  const today = new Date();
  const padZ = n => String(n).padStart(2,'0');
  const todayISO = `${today.getFullYear()}-${padZ(today.getMonth()+1)}-${padZ(today.getDate())}`;

  // ── Daily cache keys ──
  const CACHE_KEY = 'cp_sheet_cache';
  const CACHE_DATE_KEY = 'cp_sheet_cache_date';

  const [rows, setRows] = useState(()=>{
    try{
      const cached=localStorage.getItem(CACHE_KEY);
      const cachedDate=localStorage.getItem(CACHE_DATE_KEY);
      if(cached&&cachedDate===todayISO) return JSON.parse(cached);
    }catch(e){}
    return [];
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [sheetUrl, setSheetUrl] = useState(SHEET_CSV_URL);
  const [showUrlInput, setShowUrlInput] = useState(false);
  const [headers, setHeaders] = useState(()=>{
    try{
      const cached=localStorage.getItem(CACHE_KEY);
      const cachedDate=localStorage.getItem(CACHE_DATE_KEY);
      if(cached&&cachedDate===todayISO){const p=JSON.parse(cached);return p.length?Object.keys(p[0]):[];}
    }catch(e){}
    return [];
  });
  const [tab, setTab] = useState('overview');
  const [searchQ, setSearchQ] = useState('');
  const [tooltip, setTooltip] = useState(null);
  const [bankLogos, setBankLogos] = useState({});

  // ── Fetch bank logos from "bank" sheet ──
  useEffect(()=>{
    const LOGO_CACHE_KEY = 'cp_bank_logos';
    try {
      const cached = localStorage.getItem(LOGO_CACHE_KEY);
      if (cached) { setBankLogos(JSON.parse(cached)); return; }
    } catch(e) {}
    fetch(BANK_SHEET_URL + '&t=' + Date.now())
      .then(r => r.text())
      .then(text => {
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        if (lines.length < 2) return;
        const map = {};
        lines.slice(1).forEach(line => {
          const cols = line.split(',');
          const name = (cols[0] || '').replace(/^"|"$/g,'').trim();
          const url  = (cols[1] || '').replace(/^"|"$/g,'').trim();
          if (name && url) map[name] = url;
        });
        setBankLogos(map);
        try { localStorage.setItem('cp_bank_logos', JSON.stringify(map)); } catch(e) {}
      })
      .catch(()=>{});
  }, []);

  // ── Match bank name to logo (exact → contains) ──
  function getBankLogo(bankName) {
    if (!bankName) return null;
    // exact match
    if (bankLogos[bankName]) return bankLogos[bankName];
    // contains match (case-insensitive)
    const lower = bankName.toLowerCase();
    const key = Object.keys(bankLogos).find(k => lower.includes(k.toLowerCase()) || k.toLowerCase().includes(lower));
    return key ? bankLogos[key] : null;
  } // {x,y,content}

  const isCachedToday = headers.length > 0 && rows.length > 0;

  function getV(row, ...keys) {
    for (const k of keys) {
      if (row[k] !== undefined && row[k] !== '') return row[k];
    }
    for (const k of keys) {
      const found = Object.keys(row).find(rk => rk.trim().toLowerCase().includes(k.trim().toLowerCase()));
      if (found && row[found] !== undefined && row[found] !== '') return row[found];
    }
    return '';
  }

  // ── Normalize sales name: เพ้นท์1/เพ้นท์2 → เพ้นท์, แฟ้บ1/แฟ้บ2 → แฟ้บ ──
  function normalizeSalesName(name) {
    if (!name) return name;
    // Strip trailing digits/spaces: "เพ้นท์1" → "เพ้นท์", "แฟ้บ 2" → "แฟ้บ", "พีร์1" → "พีร์"
    return name.replace(/\s*\d+$/, '').trim();
  }

  const RELEASED_ST = ['ปล่อยรถแล้ว','ปล่อยแล้ว','ปล่อย'];
  const APPROVED_ST = ['อนุมัติรับรถ','อนุมัติ'];
  const isReleased = st => RELEASED_ST.some(s => st.includes(s));
  const isApproved = st => APPROVED_ST.some(s => st.includes(s));

  async function fetchSheet(force=false) {
    // Check daily cache
    if (!force) {
      try {
        const cachedDate = localStorage.getItem(CACHE_DATE_KEY);
        if (cachedDate === todayISO && rows.length > 0) return; // already cached today
      } catch(e) {}
    }

        localStorage.setItem(CACHE_KEY, JSON.stringify(parsed));

      setError(e.message || 'เกิดข้อผิดพลาด — Sheet ต้องตั้งเป็น "ใครก็ดูได้"');
    }
    setLoading(false);
  }

  // ── Analytics ──
  const stats = rows.length ? (() => {
    const byStatus={}, bySales={}, byBank={}, bySource={}, byBrand={}, byMonth={}, bySourceDetail={};
    let totalRevenue=0, totalDown=0, totalApproved=0;
    rows.forEach(r => {
      const st  = (getV(r,'สถานะ','status') || '').trim();
      const sl  = normalizeSalesName((getV(r,'เซลล์','เซลส์','ชื่อเซลส์','sales','Sale','SALES') || '').trim());

      const br  = (getV(r,'ยี่ห้อ','ยี่นอค','brand','Brand','make') || '').trim();
      const price = parseFloat(String(getV(r,'ราคารถ','ราคา','price')||'0').replace(/,/g,'')) || 0;
      const down  = parseFloat(String(getV(r,'เงินดาวน์','down')||'0').replace(/,/g,'')) || 0;
      const appAmt= parseFloat(String(getV(r,'ยอดอนุมัติ','อนุมัติ','approved')||'0').replace(/,/g,'')) || 0;
      const dateBook = normalizeDate(getV(r,'Date จอง','date จอง','วันที่จอง','จอง'));
      if (dateBook) {
        const mon = dateBook.slice(0,7);
        if (!byMonth[mon]) byMonth[mon]={total:0,released:0,revenue:0};
        byMonth[mon].total++;
        if (isReleased(st)) byMonth[mon].released++;
        byMonth[mon].revenue += price;
      }
      if (st) byStatus[st] = (byStatus[st]||0)+1;
      if (sl) {
        if(!bySales[sl]) bySales[sl]={total:0,released:0,approved:0,waiting:0,booked:0,lost:0};
        bySales[sl].total++;
        if (isReleased(st)) bySales[sl].released++;
        else if (isApproved(st)) bySales[sl].approved++;
        else if (['รอผล','รอเซ็นต์','รอเซ็น'].some(s=>st.includes(s))) bySales[sl].waiting++;
        else if (['ปิดเคส','รีเจค','ยกเลิก'].some(s=>st.includes(s))) bySales[sl].lost++;
        else bySales[sl].booked++; // จอง/รอข้อมูล/อื่น ๆ
      }
      if (bk) {
        if(!byBank[bk]) byBank[bk]={total:0,released:0,approved:0,waiting:0,lost:0};
        byBank[bk].total++;
        if(isReleased(st)) byBank[bk].released++;
        else if(isApproved(st)) byBank[bk].approved++;
        else if(['รอผล','รอเซ็นต์','รอเซ็น'].some(s=>st.includes(s))) byBank[bk].waiting++;
        else if(['ปิดเคส','รีเจค','ยกเลิก'].some(s=>st.includes(s))) byBank[bk].lost++;
      }
      if (src) {
        bySource[src] = (bySource[src]||0)+1;
        if (!bySourceDetail[src]) bySourceDetail[src]={total:0,released:0,approved:0,waiting:0,lost:0};
        bySourceDetail[src].total++;
        if (isReleased(st)) bySourceDetail[src].released++;
        else if (isApproved(st)) bySourceDetail[src].approved++;
        else if (['รอผล','รอเซ็นต์'].some(s=>st.includes(s))) bySourceDetail[src].waiting++;
        else if (['ปิดเคส','รีเจค','ยกเลิก'].some(s=>st.includes(s))) bySourceDetail[src].lost++;
      }
      if (br) byBrand[br] = (byBrand[br]||0)+1;
      totalRevenue += price; totalDown += down; totalApproved += appAmt;
    });
    // avg days: booking → release
    let totalDays=0, cntDays=0;
    rows.forEach(r=>{
      const d1=getV(r,'Date จอง','date จอง','วันที่จอง');
      const d2=getV(r,'Date วันปล่อย','date วันปล่อย','วันปล่อย','ปล่อย');
      const n1=normalizeDate(d1), n2=normalizeDate(d2);
      if(n1&&n2){const diff=(new Date(n2)-new Date(n1))/86400000;if(diff>=0&&diff<365){totalDays+=diff;cntDays++;}}
    });
    return { byStatus, bySales, byBank, bySource, bySourceDetail, byBrand, byMonth,
      totalRevenue, totalDown, totalApproved,

                {pOther>0&&<div style={{width:`${pOther}%`,background:'#484f58',transition:'width .5s'}}/>}
              </div>
              <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
                <span style={{fontSize:10,color:'#3fb950'}}>{pReleased>0?`${pReleased}% ปล่อย`:''}</span>
                <span style={{fontSize:10,fontWeight:700,color:wr>=50?'#3fb950':wr>=25?'#d29922':'#f85149'}}>Win {wr}%</span>
              </div>
            </div>;
          })}
        </div>

        {/* Conversion summary table */}
        <div className="card">
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>🎯 Conversion Rate ตามแหล่งที่มา</div>
          <div className="table-wrap"><table><thead><tr>
            <th>แหล่งที่มา</th><th style={{textAlign:'right'}}>จอง</th><th style={{textAlign:'right'}}>ปล่อย</th><th style={{textAlign:'right'}}>Win Rate</th>
          </tr></thead><tbody>
            {Object.entries(stats.bySourceDetail).sort((a,b)=>b[1].released-a[1].released).map(([src,d])=>{
              const wr = d.total>0?Math.round(d.released/d.total*100):0;
              return <tr key={src}>
                <td style={{fontWeight:600}}>{src}</td>
                <td style={{textAlign:'right'}}>{d.total}</td>
                <td style={{textAlign:'right',color:'var(--green)',fontWeight:700}}>{d.released}</td>
                <td style={{textAlign:'right'}}>
                  <span style={{fontWeight:800,color:wr>=50?'var(--green)':wr>=25?'var(--yellow)':'var(--red)'}}>{wr}%</span>
                </td>
              </tr>;
            })}
          </tbody></table></div>
        </div>
      </div>}

      {/* Brand tab */}
      {tab==='brand' && <div className="card">
        <div style={{fontWeight:700,fontSize:14,marginBottom:14}}>🚗 ยี่ห้อรถที่ขายบ่อย</div>
        {Object.entries(stats.byBrand).sort((a,b)=>b[1]-a[1]).map(([br,cnt])=>{
          const pct=Math.round(cnt/(Object.values(stats.byBrand).reduce((a,b)=>a+b,0))*100);
          return <div key={br} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:600,width:80,flexShrink:0}}>{br}</div>
            <div style={{flex:1,height:26,background:'var(--bg3)',borderRadius:6,overflow:'hidden',position:'relative'}}>
              <div style={{height:'100%',background:'rgba(63,185,80,.6)',width:`${pct}%`,borderRadius:6}}/>
              <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',paddingLeft:10,fontSize:12,fontWeight:700}}>{cnt} คัน ({pct}%)</div>
            </div>
          </div>;
        })}
      </div>}

      {/* Table tab */}
      {tab==='table' && <div className="card" style={{padding:0}}>
        <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',display:'flex',gap:10,alignItems:'center'}}>
          <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="🔍 ค้นหาในตาราง..." style={{flex:1,fontSize:13}}/>
          <span style={{fontSize:12,color:'var(--text3)',flexShrink:0}}>{filteredRows.length} แถว</span>
        </div>
        <div className="table-wrap" style={{maxHeight:500,overflowY:'auto'}}>
          <table>
            <thead><tr>
              <th>ยี่ห้อ</th><th>รุ่น</th><th>ทะเบียน</th><th>สี</th><th>เซลส์</th><th>แหล่งที่มา</th><th>ธนาคาร</th><th>สถานะ</th><th>วันจอง</th>
            </tr></thead>
            <tbody>
              {filteredRows.slice(0,100).map((r,i)=><tr key={i}>
                <td style={{fontWeight:600}}>{getV(r,'ยี่ห้อ','brand')}</td>
                <td>{getV(r,'รุ่นรถ','รุ่น')}</td>
                <td style={{color:'var(--blue)',fontWeight:600}}>{getV(r,'ทะเบียน','plate')}</td>
                <td style={{fontSize:12,color:'var(--text2)'}}>{getV(r,'สีรถ','สี')}</td>
                <td style={{color:'var(--purple)'}}>{getV(r,'เซลล์','เซลส์','sales')}</td>
                <td style={{fontSize:12}}>{getV(r,'แหล่งที่มา','source')}</td>
                <td style={{fontSize:12}}>{getV(r,'ธนาคาร','bank')}</td>
                <td><StatusBadge status={getV(r,'สถานะ','status')}/></td>
                <td style={{fontSize:11,color:'var(--text3)'}}>{getV(r,'date จอง','Date จอง')}</td>
              </tr>)}
            </tbody>
          </table>
          {filteredRows.length > 100 && <div style={{padding:'8px 16px',fontSize:12,color:'var(--text3)',textAlign:'center'}}>แสดง 100 แถวแรก / {filteredRows.length} แถว</div>}
        </div>
      </div>}
    </>}

    {!rows.length && !loading && !error && <div style={{textAlign:'center',padding:'60px 20px',color:'var(--text2)'}}>
      <div style={{fontSize:52,marginBottom:16}}>📊</div>
      <div style={{fontWeight:700,fontSize:16,marginBottom:8}}>ยังไม่มีข้อมูล</div>
      <div style={{fontSize:13,color:'var(--text3)',lineHeight:1.8}}>กด "ดึงข้อมูลจาก Google Sheet"<br/>เพื่อดูการวิเคราะห์ข้อมูลทั้งหมดครับ</div>
    </div>}
  </div>;
}

function AdminApp({currentUser,onLogout}){
  const [page,setPage]=useState('cases');const [users,setUsers]=useState([]);const [showNotif,setShowNotif]=useState(false);const [notifCount,setNotifCount]=useState(0);
  useEffect(()=>{api('getUsers').then(r=>{if(r.success)setUsers(r.data||[]);});api('getNotifications',{sales:'admin'}).then(r=>{if(r.success){const u=r.data.filter(n=>n['สถานะ']==='unread');setNotifCount(u.length);}});},[]);
  const pages={cases:<AdminCurrentCases currentUser={currentUser} users={users}/>,market:<AdminMarket currentUser={currentUser} users={users}/>,dashboard:<AdminDashboard currentUser={currentUser}/>,bookings:<AdminBookings currentUser={currentUser} users={users}/>,users:<AdminUsers currentUser={currentUser}/>,ai:<AdminAIPage currentUser={currentUser}/>,report:<AdminDailyReport/>};
  const navItems=[{key:'cases',icon:<Ico.home/>,label:'เคสปัจจุบัน'},{key:'market',icon:<Ico.market/>,label:'ตลาดเคส'},{key:'dashboard',icon:<Ico.dash/>,label:'แดชบอร์ด'},{key:'bookings',icon:<Ico.book/>,label:'การจอง'},{key:'users',icon:<Ico.user/>,label:'ผู้ใช้'},{key:'ai',icon:<Ico.ai/>,label:'AI Admin'},{key:'report',icon:<Ico.report/>,label:'Daily Report'}];
  return <div>
    <div className="sidebar"><div className="sidebar-logo"><div style={{fontWeight:800,fontSize:18,color:'var(--blue)'}}>🚗 CasePool</div><div style={{fontSize:12,color:'var(--text2)',marginTop:2}}>Admin Panel</div></div><nav className="sidebar-nav">{navItems.map(n=><div key={n.key} className={`nav-item ${page===n.key?'active':''}`} onClick={()=>setPage(n.key)}>{n.icon}<span>{n.label}</span></div>)}</nav>
    <div style={{padding:'12px 16px',borderTop:'1px solid var(--border)'}}><div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}><div style={{width:36,height:36,borderRadius:'50%',background:'var(--bg3)',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>{currentUser.avatar?<img src={currentUser.avatar} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<Ico.user/>}</div><div><div style={{fontWeight:600,fontSize:13}}>{currentUser.name}</div><div style={{fontSize:11,color:'var(--text2)'}}>Admin</div></div></div><div style={{display:'flex',gap:6}}><button className="btn btn-ghost" style={{flex:1,fontSize:12,position:'relative'}} onClick={()=>setShowNotif(!showNotif)}><Ico.bell/>{notifCount>0&&<span style={{position:'absolute',top:2,right:4,background:'var(--red)',width:16,height:16,borderRadius:'50%',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>{notifCount}</span>}</button><button className="btn btn-ghost" style={{flex:1,fontSize:12}} onClick={()=>toggleTheme()} title="เปลี่ยนธีม">🌓</button><button className="btn btn-ghost" style={{flex:1,fontSize:12}} onClick={onLogout}><Ico.logout/></button></div></div></div>
    <div className="main-content">{pages[page]||pages.cases}</div>
    {showNotif&&<NotifPanel user={currentUser} onClose={()=>setShowNotif(false)} onCountChange={setNotifCount}/>}
  </div>;
}

function SalesApp({currentUser,onLogout}){
  const [page,setPage]=useState('focus');const [users,setUsers]=useState([]);const [showNotif,setShowNotif]=useState(false);const [notifCount,setNotifCount]=useState(0);const [showSearch,setShowSearch]=useState(false);const [showOnboarding,setShowOnboarding]=useState(false);
  usePushNotif(API_URL,currentUser.name);
  useEffect(()=>{api('getUsers').then(r=>{if(r.success)setUsers(r.data||[]);});function refreshNotif(){api('getNotifications',{sales:currentUser.name}).then(r=>{if(r.success){const u=r.data.filter(n=>n['สถานะ']==='unread');setNotifCount(u.length);}});}refreshNotif();const t=setInterval(refreshNotif,30000);try{if(!localStorage.getItem('cp_onboarded_'+currentUser.userId))setShowOnboarding(true);}catch(e){}return()=>clearInterval(t);},[currentUser.name,currentUser.userId]);
  const pages={focus:<><PushNotifBanner currentUser={currentUser}/><DailyFocusPage currentUser={currentUser} onNavigate={k=>setPage(k)}/></>,market:<SalesMarket currentUser={currentUser}/>,cases:<SalesCurrentCases currentUser={currentUser} users={users}/>,claimed:<SalesClaimedCases currentUser={currentUser} users={users}/>,ai:<AIAdvisorPage currentUser={currentUser}/>,dashboard:<SalesDashboard currentUser={currentUser}/>};
  const navItems=[{key:'focus',icon:<Ico.focus/>,label:'วันนี้'},{key:'market',icon:<Ico.market/>,label:'ตลาด'},{key:'cases',icon:<Ico.home/>,label:'เคสของฉัน'},{key:'claimed',icon:<Ico.inbox/>,label:'รับตลาด'},{key:'ai',icon:<Ico.ai/>,label:'AI'},{key:'dashboard',icon:<Ico.trophy/>,label:'แดชบอร์ด'}];
  return <div>
    {showOnboarding&&<OnboardingTour currentUser={currentUser} onDone={()=>setShowOnboarding(false)}/>}
    {showSearch&&<GlobalSearch currentUser={currentUser} onClose={()=>setShowSearch(false)} onNavigate={k=>{setPage(k);setShowSearch(false);}}/>}
    <div style={{position:'fixed',top:0,left:0,right:0,height:56,background:'var(--bg2)',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 16px',zIndex:50}}>
      <div style={{fontWeight:800,color:'var(--blue)',display:'flex',alignItems:'center',gap:8}}>🚗 CasePool</div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <button className="btn btn-ghost" style={{padding:'5px 8px'}} onClick={()=>setShowSearch(true)}><Ico.gsearch/></button>
        <button className="btn btn-ghost" style={{padding:'4px 8px'}} onClick={()=>toggleTheme()}>🌓</button>
        <button className="btn btn-ghost" style={{padding:'4px 8px',position:'relative'}} onClick={()=>setShowNotif(!showNotif)}><Ico.bell/>{notifCount>0&&<span style={{position:'absolute',top:0,right:0,background:'var(--red)',width:16,height:16,borderRadius:'50%',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>{notifCount}</span>}</button>
        <button className="btn btn-ghost" style={{padding:'4px 8px'}} onClick={onLogout}><Ico.logout/></button>
      </div>
    </div>
    <div style={{paddingTop:56}}>{pages[page]||pages.focus}</div>
    <div className="bottom-nav">{navItems.map(n=><div key={n.key} className={`bottom-nav-item ${page===n.key?'active':''}`} onClick={()=>setPage(n.key)}>{n.icon}<span>{n.label}</span></div>)}</div>
    {showNotif&&<NotifPanel user={currentUser} onClose={()=>setShowNotif(false)} onCountChange={setNotifCount}/>}
  </div>;
}

function App(){
  const [user,setUser]=useState(()=>{try{const s=sessionStorage.getItem('casepool_user');return s?JSON.parse(s):null;}catch{return null;}});
  const [showLogoutConfirm,setShowLogoutConfirm]=useState(false);
  function handleLogin(u){sessionStorage.setItem('casepool_user',JSON.stringify(u));setUser(u);}
  function handleLogout(){sessionStorage.removeItem('casepool_user');Object.keys(_cache).forEach(k=>delete _cache[k]);setUser(null);setShowLogoutConfirm(false);}
  if(!user)return <LoginPage onLogin={handleLogin}/>;
  const logoutConfirmModal=showLogoutConfirm&&<div className="overlay" style={{zIndex:9999}}><div className="modal" style={{maxWidth:320}}><div className="modal-bd" style={{textAlign:'center',padding:'32px 24px'}}><div style={{fontSize:40,marginBottom:12}}>👋</div><div style={{fontWeight:700,fontSize:16,marginBottom:8}}>ออกจากระบบ?</div><div style={{fontSize:13,color:'var(--text2)',marginBottom:24}}>{user.name} · {user.role}</div><div style={{display:'flex',gap:10}}><button className="btn btn-ghost" style={{flex:1,padding:'10px'}} onClick={()=>setShowLogoutConfirm(false)}>ยกเลิก</button><button className="btn btn-danger" style={{flex:1,padding:'10px'}} onClick={handleLogout}>ออกจากระบบ</button></div></div></div></div>;
  if(user.role==='Admin')return <>{logoutConfirmModal}<AdminApp currentUser={user} onLogout={()=>setShowLogoutConfirm(true)}/></>;
  return <>{logoutConfirmModal}<SalesApp currentUser={user} onLogout={()=>setShowLogoutConfirm(true)}/></>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
